kind = "web"
previewPath = "/"
title = "BacMaster CI"
version = "1.0.0"
id = "artifacts/bacmaster-ci"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/bacmaster-ci run dev"

[services.production]

[services.production.build]
args = [ "pnpm", "--filter", "@workspace/bacmaster-ci", "run", "build" ]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = [ "pnpm", "--filter", "@workspace/bacmaster-ci", "run", "start" ]

[services.production.run.env]
PORT = "3000"
NODE_ENV = "production"

[services.production.health.startup]
path = "/auth"

[services.env]
PORT = "3000"
BASE_PATH = "/"
