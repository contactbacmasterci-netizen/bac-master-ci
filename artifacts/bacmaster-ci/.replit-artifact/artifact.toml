kind = "web"
previewPath = "/"
title = "BacMaster CI"
version = "1.0.0"
id = "artifacts/bacmaster-ci"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24505

[services.development]
run = "pnpm --filter @workspace/bacmaster-ci run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bacmaster-ci", "run", "build" ]
publicDir = "artifacts/bacmaster-ci/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24505"
BASE_PATH = "/"
